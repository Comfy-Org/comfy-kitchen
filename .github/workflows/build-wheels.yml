name: Build Wheels

on:
  push:
    branches:
      - main
      - 'dev/**'
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_wheels_linux:
    name: Build Linux wheels
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-4.13.6-linux-x86_64-cuda13-${{ hashFiles('setup.py', 'comfy_kitchen/backends/cuda/**', 'third_party/cutlass/.git') }}
          restore-keys: |
            ccache-4.13.6-linux-x86_64-cuda13-
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build one wheel containing both CUDA and HIP native extensions.
      # cibuildwheel invokes setup.py once inside a manylinux container; setup.py
      # auto-detects both toolchains and emits cuda/_C*.so plus hip/_C*.so.
      - name: Build CUDA+HIP wheel (manylinux)
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64

          # Build for Python 3.10, 3.11, and 3.12
          # 3.10/3.11 will be version-specific, 3.12 will be abi3 (stable ABI)
          CIBW_BUILD: "cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64"
          CIBW_SKIP: "*-musllinux_*"

          # Install CUDA 13.0 and ROCm HIP SDK inside the same container so the
          # wheel contains both native backends.
          CIBW_BEFORE_ALL_LINUX: |
            # Install dnf plugins for config-manager command
            dnf install -y dnf-plugins-core
            # Add NVIDIA CUDA repository for RHEL 8
            dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
            # Add AMD ROCm repository for RHEL 8 / manylinux_2_28. Signature checks
            # stay on: these RPMs carry the compiler that builds the shipped wheel.
            printf '%s\n' \
              '[rocm]' \
              'name=ROCm 7.2 repository' \
              'baseurl=https://repo.radeon.com/rocm/el8/7.2.4/main' \
              'enabled=1' \
              'priority=50' \
              'gpgcheck=1' \
              'gpgkey=https://repo.radeon.com/rocm/rocm.gpg.key' \
              '' \
              '[amdgraphics]' \
              'name=AMD Graphics 7.2 repository' \
              'baseurl=https://repo.radeon.com/graphics/7.2.4/el/8/main/x86_64/' \
              'enabled=1' \
              'priority=50' \
              'gpgcheck=1' \
              'gpgkey=https://repo.radeon.com/rocm/rocm.gpg.key' \
              >/etc/yum.repos.d/rocm.repo
            rpm --import https://repo.radeon.com/rocm/rocm.gpg.key
            dnf clean all
            # Install only the CUDA packages needed for compilation, plus HIP SDK.
            dnf install -y cuda-nvcc-13-0 cuda-cudart-devel-13-0 libcublas-devel-13-0 libnvjitlink-devel-13-0
            dnf install -y rocm-hip-sdk rocm-device-libs
            # Install Python development headers (fallback for CMake FindPython)
            dnf install -y python3-devel curl ninja-build tar xz
            # EL8 ships ccache 3.7.7, which predates NVCC -x cu handling.
            # Use the same pinned modern ccache release on both Linux architectures.
            CCACHE_VERSION=4.13.6
            CCACHE_ARCH=$(uname -m)
            case "$CCACHE_ARCH" in
              x86_64) CCACHE_SHA256=156ec57c5198cc849d92834023d09910b83dc5504c6cf405d09e6ae7b208a3e5 ;;
              aarch64) CCACHE_SHA256=2098d561e4a8e36bd06a29aedce53ea90c7e365f9573a93d91c230efbf96a958 ;;
              *) echo "Unsupported ccache architecture: $CCACHE_ARCH" >&2; exit 1 ;;
            esac
            CCACHE_ARCHIVE="ccache-$CCACHE_VERSION-linux-$CCACHE_ARCH-musl-static.tar.xz"
            curl --fail --location --retry 3 --silent --show-error "https://github.com/ccache/ccache/releases/download/v$CCACHE_VERSION/$CCACHE_ARCHIVE" --output "/tmp/$CCACHE_ARCHIVE"
            echo "$CCACHE_SHA256  /tmp/$CCACHE_ARCHIVE" | sha256sum --check
            tar -xJf "/tmp/$CCACHE_ARCHIVE" -C /tmp
            install -m 755 "/tmp/${CCACHE_ARCHIVE%.tar.xz}/ccache" /usr/local/bin/ccache
            ccache --version
            # Reset counters, but retain restored compiler objects.
            CCACHE_DIR=/host${{ github.workspace }}/.ccache ccache --zero-stats
            # Verify compiler installations
            /usr/local/cuda-13.0/bin/nvcc --version
            /opt/rocm/bin/amdclang++ --version
            /opt/rocm/bin/hipcc --version

          # Set CUDA and ROCm environments.
          CIBW_ENVIRONMENT_LINUX: >
            CUDA_HOME=/usr/local/cuda-13.0
            ROCM_HOME=/opt/rocm
            ROCM_PATH=/opt/rocm
            PATH=/usr/local/cuda-13.0/bin:/opt/rocm/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda-13.0/lib64:/opt/rocm/lib:/opt/rocm/lib64:$LD_LIBRARY_PATH
            LIBRARY_PATH=/usr/local/cuda-13.0/lib64/stubs:$LIBRARY_PATH
            CMAKE_GENERATOR=Ninja
            COMFY_CUDA_COMPILER_LAUNCHER=ccache
            COMFY_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=/host${{ github.workspace }}/.ccache
            CCACHE_BASEDIR=/project
            CCACHE_COMPILERCHECK=content
            COMFY_HIP_ARCHS='gfx1030;gfx1031;gfx1032;gfx1033;gfx1034;gfx1035;gfx1036;gfx1100;gfx1101;gfx1102;gfx1103;gfx1150;gfx1151;gfx1152;gfx1153;gfx1200;gfx1201'

          # Report the previous interpreter build's cache result, then install build dependencies.
          CIBW_BEFORE_BUILD: |
            python --version
            ccache --show-stats
            pip install nanobind cmake setuptools wheel

          # Repair wheel for manylinux compliance, excluding GPU runtime libs.
          # Users must have the matching CUDA or ROCm runtime installed locally.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libcuda.so.1
            --exclude libcudart.so.13
            --exclude libnvrtc.so.13
            --exclude libcublas.so.13
            --exclude libcublasLt.so.13
            --exclude libnvJitLink.so.13
            --exclude libamdhip64.so.7
            --exclude libamdhip64.so
            --exclude libhsa-runtime64.so.1
            --exclude libhsa-runtime64.so
            --exclude libamd_comgr.so.3
            --exclude libamd_comgr.so
            --exclude libdrm.so.2
            --exclude libdrm_amdgpu.so.1
            --exclude librocm-core.so.1

        with:
          output-dir: wheelhouse

      - name: Report final compiler-cache statistics
        shell: bash
        run: |
          ccache_version=4.13.6
          archive="$RUNNER_TEMP/ccache-$ccache_version-linux-x86_64-musl-static.tar.xz"
          curl --fail --location --retry 3 --silent --show-error "https://github.com/ccache/ccache/releases/download/v$ccache_version/ccache-$ccache_version-linux-x86_64-musl-static.tar.xz" --output "$archive"
          echo "156ec57c5198cc849d92834023d09910b83dc5504c6cf405d09e6ae7b208a3e5  $archive" | sha256sum --check
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          CCACHE_DIR="$GITHUB_WORKSPACE/.ccache" "$RUNNER_TEMP/ccache-$ccache_version-linux-x86_64-musl-static/ccache" --show-stats

      - name: Verify Linux wheels contain CUDA and HIP extensions
        shell: bash
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          wheels = sorted(Path("wheelhouse").glob("*manylinux*.whl"))
          if not wheels:
              raise SystemExit("No manylinux wheels found")

          for wheel in wheels:
              # 3.10/3.11 are version-specific; 3.12 must stay abi3 or it silently
              # stops covering 3.13+. Assert the tag before the member checks below.
              pytag, abitag = wheel.name.split("-")[-3:-1]
              if pytag == "cp312" and abitag != "abi3":
                  raise SystemExit(f"{wheel.name}: cp312 wheel lost its abi3 tag (got {abitag})")
              with zipfile.ZipFile(wheel) as zf:
                  names = zf.namelist()
              has_cuda = any(
                  name.startswith("comfy_kitchen/backends/cuda/_C") and name.endswith(".so")
                  for name in names
              )
              has_hip = any(
                  name.startswith("comfy_kitchen/backends/hip/_C") and name.endswith(".so")
                  for name in names
              )
              print(f"{wheel.name}: cuda={has_cuda} hip={has_hip}")
              if not has_cuda or not has_hip:
                  raise SystemExit(f"{wheel.name} does not contain both CUDA and HIP extensions")
          PY

      - name: Build CPU-only wheel (py3-none-any)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel
          # Build pure Python variant (no native CUDA/HIP extensions)
          python setup.py bdist_wheel --no-cuda --no-hip
          # Move to wheelhouse directory
          mv dist/*py3-none-any.whl wheelhouse/

      - name: List built wheels
        shell: bash
        run: |
          ls -lh wheelhouse/
          echo "Built wheels:"
          ls -1 wheelhouse/*.whl

      - name: Upload Linux CUDA+HIP wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-cuda-hip
          path: wheelhouse/*manylinux*.whl
          if-no-files-found: error

      - name: Upload CPU-only wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cpu-only
          path: wheelhouse/*py3-none-any.whl
          if-no-files-found: error

  build_wheels_linux_arm64:
    name: Build Linux ARM64 wheels
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-4.13.6-linux-aarch64-cuda13-${{ hashFiles('setup.py', 'comfy_kitchen/backends/cuda/**', 'third_party/cutlass/.git') }}
          restore-keys: |
            ccache-4.13.6-linux-aarch64-cuda13-
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build CUDA wheel using cibuildwheel with manylinux container for ARM64
      - name: Build CUDA wheel (manylinux ARM64)
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Use manylinux_2_28 for ARM64
          CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_28_aarch64

          # Build for Python 3.10, 3.11, and 3.12 on ARM64
          CIBW_BUILD: "cp310-manylinux_aarch64 cp311-manylinux_aarch64 cp312-manylinux_aarch64"
          CIBW_SKIP: "*-musllinux_*"

          # Native ARM64 runner - no emulation needed
          CIBW_ARCHS_LINUX: aarch64

          # Install CUDA 13.0 toolkit inside the container (using sbsa repo for ARM64)
          CIBW_BEFORE_ALL_LINUX: |
            # Install dnf plugins for config-manager command
            dnf install -y dnf-plugins-core
            # Add NVIDIA CUDA repository for RHEL 8 ARM64 (sbsa = server-based system architecture)
            dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/sbsa/cuda-rhel8.repo
            dnf clean all
            # Install ONLY the minimal CUDA packages needed for compilation (not the full toolkit)
            dnf install -y cuda-nvcc-13-0 cuda-cudart-devel-13-0 libcublas-devel-13-0 libnvjitlink-devel-13-0
            # Install Python development headers (fallback for CMake FindPython)
            dnf install -y python3-devel curl ninja-build tar xz
            # EL8 ships ccache 3.7.7, which predates NVCC -x cu handling.
            # Use the same pinned modern ccache release on both Linux architectures.
            CCACHE_VERSION=4.13.6
            CCACHE_ARCH=$(uname -m)
            case "$CCACHE_ARCH" in
              x86_64) CCACHE_SHA256=156ec57c5198cc849d92834023d09910b83dc5504c6cf405d09e6ae7b208a3e5 ;;
              aarch64) CCACHE_SHA256=2098d561e4a8e36bd06a29aedce53ea90c7e365f9573a93d91c230efbf96a958 ;;
              *) echo "Unsupported ccache architecture: $CCACHE_ARCH" >&2; exit 1 ;;
            esac
            CCACHE_ARCHIVE="ccache-$CCACHE_VERSION-linux-$CCACHE_ARCH-musl-static.tar.xz"
            curl --fail --location --retry 3 --silent --show-error "https://github.com/ccache/ccache/releases/download/v$CCACHE_VERSION/$CCACHE_ARCHIVE" --output "/tmp/$CCACHE_ARCHIVE"
            echo "$CCACHE_SHA256  /tmp/$CCACHE_ARCHIVE" | sha256sum --check
            tar -xJf "/tmp/$CCACHE_ARCHIVE" -C /tmp
            install -m 755 "/tmp/${CCACHE_ARCHIVE%.tar.xz}/ccache" /usr/local/bin/ccache
            ccache --version
            # Reset counters, but retain restored compiler objects.
            CCACHE_DIR=/host${{ github.workspace }}/.ccache ccache --zero-stats
            # Verify CUDA installation
            /usr/local/cuda-13.0/bin/nvcc --version

          # Set CUDA environment and install build dependencies
          CIBW_ENVIRONMENT_LINUX: >
            CUDA_HOME=/usr/local/cuda-13.0
            PATH=/usr/local/cuda-13.0/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda-13.0/lib64:$LD_LIBRARY_PATH
            LIBRARY_PATH=/usr/local/cuda-13.0/lib64/stubs:$LIBRARY_PATH
            CMAKE_GENERATOR=Ninja
            COMFY_CUDA_COMPILER_LAUNCHER=ccache
            COMFY_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=/host${{ github.workspace }}/.ccache
            CCACHE_BASEDIR=/project
            CCACHE_COMPILERCHECK=content

          # Report the previous interpreter build's cache result, then install build dependencies.
          CIBW_BEFORE_BUILD: |
            python --version
            ccache --show-stats
            pip install nanobind cmake setuptools wheel

          # Repair wheel for manylinux compliance, excluding CUDA runtime libs
          # Users must have CUDA installed on their system
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libcuda.so.1
            --exclude libcudart.so.13
            --exclude libnvrtc.so.13
            --exclude libcublas.so.13
            --exclude libcublasLt.so.13
            --exclude libnvJitLink.so.13

        with:
          output-dir: wheelhouse

      - name: Report final compiler-cache statistics
        shell: bash
        run: |
          ccache_version=4.13.6
          archive="$RUNNER_TEMP/ccache-$ccache_version-linux-aarch64-musl-static.tar.xz"
          curl --fail --location --retry 3 --silent --show-error "https://github.com/ccache/ccache/releases/download/v$ccache_version/ccache-$ccache_version-linux-aarch64-musl-static.tar.xz" --output "$archive"
          echo "2098d561e4a8e36bd06a29aedce53ea90c7e365f9573a93d91c230efbf96a958  $archive" | sha256sum --check
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          CCACHE_DIR="$GITHUB_WORKSPACE/.ccache" "$RUNNER_TEMP/ccache-$ccache_version-linux-aarch64-musl-static/ccache" --show-stats

      - name: List built wheels
        shell: bash
        run: |
          ls -lh wheelhouse/
          echo "Built wheels:"
          ls -1 wheelhouse/*.whl

      - name: Upload Linux ARM64 CUDA wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-arm64-cuda
          path: wheelhouse/*manylinux*.whl
          if-no-files-found: error

  build_wheels_windows:
    name: Build Windows wheel (Python ${{ matrix.python-version }})
    runs-on: windows-2022
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-windows-x86_64-cuda13-${{ hashFiles('setup.py', 'comfy_kitchen/backends/cuda/**', 'third_party/cutlass/.git') }}
          restore-keys: |
            ccache-windows-x86_64-cuda13-

      - name: Install compiler cache and Ninja
        shell: pwsh
        run: choco install ccache ninja --no-progress --yes
      - name: Install CUDA Toolkit 13.0.2
        uses: Jimver/cuda-toolkit@v0.2.29
        id: cuda-toolkit
        with:
          cuda: '13.0.2'
          method: 'network'
          use-github-cache: 'true'
          log-file-suffix: 'windows-2022.txt'

      - name: Set compiler-cache and CUDA environment
        shell: pwsh
        run: |
          echo "CUDA_PATH_V13_0=$env:CUDA_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "COMFY_CUDA_COMPILER_LAUNCHER=ccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "COMFY_CXX_COMPILER_LAUNCHER=ccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CCACHE_DIR=$env:GITHUB_WORKSPACE\.ccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CCACHE_BASEDIR=$env:GITHUB_WORKSPACE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CCACHE_COMPILERCHECK=content" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify CUDA installation
        shell: bash
        run: |
          echo "CUDA_HOME: $CUDA_HOME"
          echo "CUDA_PATH: $CUDA_PATH"
          nvcc --version

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create python3.lib for stable ABI
        if: matrix.python-version == '3.12'
        shell: pwsh
        run: |
          # Create python3.lib for stable ABI support
          $pythonDir = Split-Path -Parent (Get-Command python).Source
          $libsDir = Join-Path $pythonDir "libs"
          $pythonLib = Get-ChildItem -Path $libsDir -Filter "python3*.lib" | Where-Object { $_.Name -match "python3\d+\.lib" } | Select-Object -First 1
          
          if ($pythonLib) {
            $python3Lib = Join-Path $libsDir "python3.lib"
            if (-not (Test-Path $python3Lib)) {
              Copy-Item -Path $pythonLib.FullName -Destination $python3Lib
              Write-Host "Created python3.lib for stable ABI"
            }
          } else {
            Write-Error "Could not find python3XX.lib"
            exit 1
          }

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.27.0"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # ninja: CMake's default Windows generator is Visual Studio, which has no
          # HIP language support, so setup.py drives the HIP build with Ninja.
          pip install build setuptools wheel nanobind ninja

      - name: Install ROCm HIP SDK (Windows)
        shell: bash
        env:
          ROCM_SDK_VERSION: "7.2.1"
        run: |
          # ROCm on Windows is not on PyPI (pypi.org/project/rocm-sdk-devel is a 0.1.0
          # placeholder), so the toolchain comes from AMD's own release directory, the
          # same host the Linux job takes its RPMs from. Pinned to a versioned release,
          # so the toolchain cannot drift under a given commit.
          #
          # setup.py finds the toolchain via `python -m rocm_sdk path --root`; no
          # ROCM_PATH and no Visual Studio developer shell are needed.
          #
          # [libraries] is not optional here even though these kernels never call
          # hipBLAS: expanding the devel tree hardlinks against it, and the install
          # fails without it. The compiler it ships is not tied to a GPU family and
          # builds every gfx in COMFY_HIP_ARCHS, RDNA2 through RDNA4.
          pip install \
            --find-links "https://repo.radeon.com/rocm/windows/rocm-rel-${ROCM_SDK_VERSION}/" \
            "rocm[libraries,devel]==${ROCM_SDK_VERSION}"
          python -m rocm_sdk path --root

      - name: Build CUDA+HIP wheel
        shell: bash
        env:
          COMFY_HIP_ARCHS: "gfx1030;gfx1031;gfx1032;gfx1033;gfx1034;gfx1035;gfx1036;gfx1100;gfx1101;gfx1102;gfx1103;gfx1150;gfx1151;gfx1152;gfx1153;gfx1200;gfx1201"
        run: |
          # setup.py detects both toolchains and emits cuda/_C* plus hip/_C* into one
          # wheel. Python 3.12 produces an abi3 wheel (both extensions are built
          # against the limited API); 3.10/3.11 stay version-specific.
          python setup.py bdist_wheel

      - name: Verify the Windows wheel contains CUDA and HIP extensions
        shell: bash
        run: |
          pip install pefile
          python - <<'PY'
          import re
          import zipfile
          from pathlib import Path

          import pefile

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheels found")

          for wheel in wheels:
              # 3.10/3.11 are version-specific; 3.12 must stay abi3 or it silently
              # stops covering 3.13+. Assert the tag before the member/linkage checks.
              pytag, abitag = wheel.name.split("-")[-3:-1]
              if pytag == "cp312" and abitag != "abi3":
                  raise SystemExit(f"{wheel.name}: cp312 wheel lost its abi3 tag (got {abitag})")
              with zipfile.ZipFile(wheel) as zf:
                  names = zf.namelist()
                  pyds = [n for n in names
                          if n.startswith("comfy_kitchen/backends/") and n.endswith(".pyd")]

                  def has(backend):
                      return any(
                          n.startswith(f"comfy_kitchen/backends/{backend}/_C")
                          and n.endswith(".pyd")
                          for n in names
                      )
                  print(f"{wheel.name}: cuda={has('cuda')} hip={has('hip')}")
                  if not has("cuda") or not has("hip"):
                      raise SystemExit(f"{wheel.name} does not contain both extensions")

                  # An abi3-tagged wheel must link the stable python3.dll, not a
                  # versioned interpreter DLL, or it is version-locked despite the tag.
                  if "abi3" in wheel.name:
                      for n in pyds:
                          imports = {
                              entry.dll.decode("ascii", "replace").lower()
                              for entry in pefile.PE(data=zf.read(n)).DIRECTORY_ENTRY_IMPORT
                          }
                          versioned = sorted(d for d in imports if re.fullmatch(r"python3\d+\.dll", d))
                          if "python3.dll" not in imports or versioned:
                              raise SystemExit(
                                  f"{wheel.name}:{n} is not stable-ABI linked "
                                  f"(python3.dll missing or versioned {versioned})"
                              )
                          print(f"  {n}: abi3 OK (links python3.dll)")
          PY

      - name: Report compiler-cache statistics
        shell: pwsh
        run: ccache --show-stats

      - name: List built wheels
        shell: bash
        run: |
          ls -lh dist/
          echo "Built wheels:"
          ls -1 dist/*.whl

      - name: Upload Windows wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-cuda-hip-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  test_linux:
    name: Test on Linux (Python ${{ matrix.python-version }})
    needs: build_wheels_linux
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download CPU-only wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-only
          path: dist/

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch first (smaller download, no CUDA needed for CI)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install the CPU-only wheel (py3-none-any works everywhere)
          pip install dist/*py3-none-any.whl
          pip install pytest ruff

      - name: Ruff check
        shell: bash
        run: |
          ruff check .

      - name: Run tests
        shell: bash
        run: |
          # Run all tests - conftest handles backend availability
          # Tests requiring CUDA will be skipped on CPU-only runners
          python -m pytest tests/ -v --tb=short

  test_windows:
    name: Test on Windows (Python ${{ matrix.python-version }})
    needs: build_wheels_windows
    runs-on: windows-2022
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download Windows wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-cuda-hip-${{ matrix.python-version }}
          path: dist/

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch first (smaller download, no CUDA needed for CI)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Windows: install the CUDA wheel (will work in CPU-only mode)
          pip install dist/*.whl
          pip install pytest ruff

      - name: Ruff check
        shell: bash
        run: |
          ruff check .

      - name: Run tests
        shell: bash
        run: |
          # Run all tests - conftest handles backend availability
          # Tests requiring CUDA will be skipped on CPU-only runners
          python -m pytest tests/ -v --tb=short

  publish:
    name: Publish to PyPI
    needs: [build_wheels_linux, build_wheels_linux_arm64, build_wheels_windows, test_linux, test_windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi

    steps:
      - name: Download Linux CUDA+HIP wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux-cuda-hip
          path: dist/

      - name: Download Linux ARM64 CUDA wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux-arm64-cuda
          path: dist/

      - name: Download Windows CUDA wheel (3.10)
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-cuda-hip-3.10
          path: dist/

      - name: Download Windows CUDA wheel (3.11)
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-cuda-hip-3.11
          path: dist/

      - name: Download Windows CUDA wheel (3.12)
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-cuda-hip-3.12
          path: dist/

      - name: Download CPU-only wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-only
          path: dist/

      - name: List wheels to publish
        run: |
          echo "Wheels to publish:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
          verbose: true
